<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Leading Indicator - Bank Muamalat</title>
  <style>
    :root {
      --bg: #f1f5f9; --card-bg: #ffffff; --border: #e2e8f0; --text: #0f172a; --text-light: #64748b;
      --header-bg: #0f172a; --header-text: #ffffff; --btn-bg: #1e40af; --btn-text: #ffffff;
      --input-bg: #ffffff; --success: #16a34a; --warning: #f59e0b; --danger: #dc2626; --info: #3b82f6;
      --shadow: 0 4px 12px rgba(0,0,0,0.06); --progress-bg: #e2e8f0; --tag-bg: #dbeafe; --tag-text: #1e40af;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --card-bg: #1e293b; --border: #334155; --text: #f8fafc; --text-light: #94a3b8;
      --header-bg: #020617; --header-text: #f8fafc; --btn-bg: #3b82f6; --btn-text: #0f172a;
      --input-bg: #334155; --success: #4ade80; --warning: #facc15; --danger: #f87171; --info: #60a5fa;
      --shadow: 0 4px 16px rgba(0,0,0,0.4); --progress-bg: #475569; --tag-bg: #1e3a8a; --tag-text: #93c5fd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif; background: var(--bg); color: var(--text); padding: 12px; line-height: 1.4; font-size: 14px; transition: background 0.3s ease, color 0.3s ease; }
    .header { background: var(--header-bg); color: var(--header-text); padding: 16px; border-radius: 14px; margin-bottom: 14px; text-align: center; position: relative; transition: background 0.3s ease; }
    .header h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .header .meta { font-size: 0.8rem; opacity: 0.9; }
    .theme-toggle { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.15); border: none; color: var(--header-text); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(4px); transition: background 0.2s; }
    .theme-toggle:hover { background: rgba(255,255,255,0.25); }
    .filters { background: var(--card-bg); padding: 14px; border-radius: 12px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; box-shadow: var(--shadow); transition: background 0.3s, box-shadow 0.3s; }
    .filters label { font-size: 0.75rem; color: var(--text-light); display: block; margin-bottom: 4px; }
    .filters select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--input-bg); color: var(--text); transition: background 0.3s, border-color 0.3s; }
    .filters button { padding: 10px 16px; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
    .filters button:hover { opacity: 0.9; } .filters button:active { transform: scale(0.98); }
    .summary-bar { background: var(--card-bg); padding: 12px; border-radius: 12px; margin-bottom: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; font-size: 0.8rem; box-shadow: var(--shadow); transition: background 0.3s, box-shadow 0.3s; }
    .summary-item .label { color: var(--text-light); display: block; margin-bottom: 4px; }
    .summary-item .value { font-weight: 700; font-size: 1.05rem; transition: color 0.3s; }
    .summary-item .value.neg { color: var(--danger); } .summary-item .value.pos { color: var(--success); }
    .params-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .param-card { background: var(--card-bg); border-radius: 12px; padding: 14px; box-shadow: var(--shadow); border-left: 4px solid var(--info); transition: transform 0.2s, background 0.3s, box-shadow 0.3s; }
    .param-card:hover { transform: translateY(-3px); }
    .param-card.ca { border-left-color: #3b82f6; } .param-card.sa { border-left-color: #8b5cf6; } .param-card.fu { border-left-color: #06b6d4; } .param-card.con { border-left-color: #f59e0b; }
    .param-card.sme { border-left-color: #16a34a; } .param-card.ph { border-left-color: #ec4899; } .param-card.mdin { border-left-color: #6366f1; } .param-card.qris { border-left-color: #14b8a6; } .param-card.sli { border-left-color: #f97316; } .param-card.cif { border-left-color: #84cc16; }
    .param-card .title { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); display: flex; align-items: center; gap: 6px; }
    .metric-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; }
    .metric-row .label { color: var(--text-light); } .metric-row .value { font-weight: 600; font-family: 'SF Mono', 'Courier New', monospace; }
    .metric-row.gap .value.neg { color: var(--danger); font-weight: 700; } .metric-row.gap .value.pos { color: var(--success); font-weight: 700; }
    .achievement { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); text-align: center; }
    .achievement .label { font-size: 0.8rem; color: var(--text-light); }
    .achievement .value { font-size: 1.4rem; font-weight: 800; margin: 4px 0; transition: color 0.3s; }
    .achievement .value.low { color: var(--danger); } .achievement .value.mid { color: var(--warning); } .achievement .value.high { color: var(--success); }
    .progress-bar { height: 6px; background: var(--progress-bg); border-radius: 3px; overflow: hidden; margin-top: 6px; transition: background 0.3s; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.3s; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-left: 6px; background: var(--tag-bg); color: var(--tag-text); transition: background 0.3s, color 0.3s; }
    .footer { text-align: center; padding: 20px 10px; color: var(--text-light); font-size: 0.75rem; margin-top: 20px; transition: color 0.3s; }
    .loading, .error-msg { grid-column: 1 / -1; text-align: center; padding: 24px; color: var(--text-light); }
    .error-msg { color: var(--danger); background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; }
    @media (max-width: 600px) { .filters { grid-template-columns: 1fr; } .summary-bar { grid-template-columns: repeat(2, 1fr); } .params-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏦 Bank Muamalat</h1>
    <div class="meta">📅 Leading Indicator Dashboard</div>
    <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
  </div>

  <div class="filters">
    <div><label>📍 Co-Branch</label><select id="coBranchFilter"><option value="ALL">Semua Co-Branch</option><option value="BANDA ACEH">BANDA ACEH</option><option value="BENGKULU">BENGKULU</option><option value="LAMPUNG">LAMPUNG</option><option value="MEDAN BALAIKOTA">MEDAN BALAIKOTA</option><option value="MEDAN BARU">MEDAN BARU</option><option value="PADANG">PADANG</option><option value="PALEMBANG">PALEMBANG</option><option value="PANGKAL PINANG">PANGKAL PINANG</option><option value="PEKANBARU">PEKANBARU</option></select></div>
    <div><label>🏢 Branch</label><select id="branchFilter"><option value="ALL">Semua Branch</option></select></div>
    <button onclick="resetDashboard()">🔄 Reset Filter</button>
  </div>

  <div class="summary-bar">
    <div class="summary-item"><span class="label">Total Gap CA</span><span class="value" id="sumGapCA">0.0 M</span></div>
    <div class="summary-item"><span class="label">Total Gap SA</span><span class="value" id="sumGapSA">0.0 M</span></div>
    <div class="summary-item"><span class="label">Total Gap Funding</span><span class="value" id="sumGapFU">0.0 M</span></div>
    <div class="summary-item"><span class="label">Avg Achievement</span><span class="value" id="avgAchieve">0.0%</span></div>
  </div>

  <div class="params-grid" id="paramsContainer">
    <div class="loading">⏳ Memuat data dari lead_inc.json...</div>
  </div>

  <div class="footer">💡 Update data cukup ganti file lead_inc.json | 📱 Optimized for Mobile & Web | Theme: <span id="themeLabel">Light</span></div>

<script>
  let ntData = [];
  const coBranchSelect = document.getElementById('coBranchFilter');
  const branchSelect = document.getElementById('branchFilter');
  const themeToggle = document.getElementById('themeToggle');
  const themeLabel = document.getElementById('themeLabel');
  const html = document.documentElement;

  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    themeLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
  }

  // 📥 LOAD EXTERNAL JSON
  async function loadExternalData() {
    try {
      const res = await fetch('lead_inc.json');
      if (!res.ok) throw new Error('File tidak ditemukan');
      const json = await res.json();
      const raw = json["Sheet1 "] || [];

      // Bersihkan data (trim spasi & konversi ke number)
      const toNum = (v) => {
        if (!v) return 0;
        const n = parseFloat(v.toString().replace(',', '.').trim());
        return isNaN(n) ? 0 : n;
      };

      ntData = raw.map(r => ({
        co: (r["co "] || "").trim(),
        br: (r["br "] || "").trim(),
        tp: (r["tp "] || "").trim(),
        ca_mtd: toNum(r["ca_mtd "]), ca_tgt: toNum(r["ca_tgt "]),
        sa_mtd: toNum(r["sa_mtd "]), sa_tgt: toNum(r["sa_tgt "]),
        fu_mtd: toNum(r["fu_mtd "]), fu_tgt: toNum(r["fu_tgt "]),
        con_mtd: toNum(r["con_mtd "]), con_tgt: toNum(r["con_tgt "]),
        sme_mtd: toNum(r["sme_mtd "]), sme_tgt: toNum(r["sme_tgt "]),
        ph_mtd: toNum(r["ph_mtd "]), ph_tgt: toNum(r["ph_tgt "]),
        mdin_mtd: toNum(r["mdin_mtd "]), mdin_tgt: toNum(r["mdin_tgt "]),
        qris_mtd: toNum(r["qris_mtd "]), qris_tgt: toNum(r["qris_tgt "]),
        sli_mtd: toNum(r["sli_mtd "]), sli_tgt: toNum(r["sli_tgt "]),
        cif_mtd: toNum(r["cif_mtd "]), cif_tgt: toNum(r["cif_tgt "])
      }));

      updateBranchOptions('ALL');
      renderDashboard();
    } catch (err) {
      console.error("Gagal memuat JSON:", err);
      document.getElementById('paramsContainer').innerHTML = `
        <div class="error-msg">
          ⚠️ <strong>Gagal memuat lead_inc.json</strong><br>
          <small>1. Pastikan file HTML & JSON berada di folder yang sama.<br>
          2. Jika dibuka langsung (double-click), gunakan <b>VS Code Live Server</b> atau server lokal lainnya karena kebijakan keamanan browser (CORS) memblokir fetch via file://</small>
        </div>`;
    }
  }

  // 🔄 CASCADING DROPDOWN & FILTER
  function updateBranchOptions(selectedCo) {
    branchSelect.innerHTML = '<option value="ALL">Semua Branch</option>';
    const filtered = selectedCo === 'ALL' ? ntData : ntData.filter(d => d.co === selectedCo);
    const uniqueBranches = [...new Set(filtered.map(d => d.br))].sort();
    uniqueBranches.forEach(br => {
      const opt = document.createElement('option');
      opt.value = br; opt.textContent = br;
      branchSelect.appendChild(opt);
    });
    branchSelect.value = 'ALL';
  }

  coBranchSelect.addEventListener('change', () => { updateBranchOptions(coBranchSelect.value); renderDashboard(); });
  branchSelect.addEventListener('change', renderDashboard);

  function resetDashboard() {
    coBranchSelect.value = 'ALL';
    updateBranchOptions('ALL');
    renderDashboard();
  }

  // 📊 CALCULATION & RENDER
  function calcMetrics(data) {
    return data.map(d => ({
      ...d,
      gapCA: d.ca_mtd - d.ca_tgt, gapSA: d.sa_mtd - d.sa_tgt, gapFU: d.fu_mtd - d.fu_tgt,
      gapCon: d.con_mtd - d.con_tgt, gapSME: d.sme_mtd - d.sme_tgt, gapPH: d.ph_mtd - d.ph_tgt,
      gapMDIN: d.mdin_mtd - d.mdin_tgt, gapQRIS: d.qris_mtd - d.qris_tgt, gapSLI: d.sli_mtd - d.sli_tgt,
      gapCIF: d.cif_mtd - d.cif_tgt,
      achCA: d.ca_tgt>0?(d.ca_mtd/d.ca_tgt*100):0, achSA: d.sa_tgt>0?(d.sa_mtd/d.sa_tgt*100):0,
      achFU: d.fu_tgt>0?(d.fu_mtd/d.fu_tgt*100):0, achCon: d.con_tgt>0?(d.con_mtd/d.con_tgt*100):0,
      achSME: d.sme_tgt>0?(d.sme_mtd/d.sme_tgt*100):0, achPH: d.ph_tgt>0?(d.ph_mtd/d.ph_tgt*100):0,
      achMDIN: d.mdin_tgt>0?(d.mdin_mtd/d.mdin_tgt*100):0, achQRIS: d.qris_tgt>0?(d.qris_mtd/d.qris_tgt*100):0,
      achSLI: d.sli_tgt>0?(d.sli_mtd/d.sli_tgt*100):0, achCIF: d.cif_tgt>0?(d.cif_mtd/d.cif_tgt*100):0
    }));
  }

  function aggregate(data, coBr, br) {
    let filtered = data;
    if(coBr!=='ALL') filtered = filtered.filter(d=>d.co===coBr);
    if(br!=='ALL') filtered = filtered.filter(d=>d.br===br);
    const sum = (key) => filtered.reduce((a,b)=>a+(b[key]||0),0);
    const count = filtered.length;
    const avg = (key) => count > 0 ? sum(key)/count : 0;
    return {
      ca_mtd:sum('ca_mtd'), ca_tgt:sum('ca_tgt'), gapCA:sum('gapCA'), achCA:avg('achCA'),
      sa_mtd:sum('sa_mtd'), sa_tgt:sum('sa_tgt'), gapSA:sum('gapSA'), achSA:avg('achSA'),
      fu_mtd:sum('fu_mtd'), fu_tgt:sum('fu_tgt'), gapFU:sum('gapFU'), achFU:avg('achFU'),
      con_mtd:sum('con_mtd'), con_tgt:sum('con_tgt'), gapCon:sum('gapCon'), achCon:avg('achCon'),
      sme_mtd:sum('sme_mtd'), sme_tgt:sum('sme_tgt'), gapSME:sum('gapSME'), achSME:avg('achSME'),
      ph_mtd:sum('ph_mtd'), ph_tgt:sum('ph_tgt'), gapPH:sum('gapPH'), achPH:avg('achPH'),
      mdin_mtd:sum('mdin_mtd'), mdin_tgt:sum('mdin_tgt'), gapMDIN:sum('gapMDIN'), achMDIN:avg('achMDIN'),
      qris_mtd:sum('qris_mtd'), qris_tgt:sum('qris_tgt'), gapQRIS:sum('gapQRIS'), achQRIS:avg('achQRIS'),
      sli_mtd:sum('sli_mtd'), sli_tgt:sum('sli_tgt'), gapSLI:sum('gapSLI'), achSLI:avg('achSLI'),
      cif_mtd:sum('cif_mtd'), cif_tgt:sum('cif_tgt'), gapCIF:sum('gapCIF'), achCIF:avg('achCIF')
    };
  }

  function formatNum(val, unit='') {
    if(unit==='M') return (val>=0?'+':'') + val.toFixed(1) + ' M';
    return val>=0 ? val.toLocaleString('id-ID') : '(' + Math.abs(val).toLocaleString('id-ID') + ')';
  }

  function getAchieveClass(pct) { if(pct >= 100) return 'high'; if(pct >= 50) return 'mid'; return 'low'; }

  function renderDashboard() {
    if(ntData.length === 0) return;
    const coBr = coBranchSelect.value;
    const br = branchSelect.value;
    const total = aggregate(calcMetrics(ntData), coBr, br);
    const container = document.getElementById('paramsContainer');
    container.innerHTML = '';
    
    const params = [
      {id:'ca',name:'🏦 Current Account',unit:'M',color:'ca',metrics:[{k:'ca_mtd',l:'Growth MTD'},{k:'ca_tgt',l:'Target MTD'},{k:'gapCA',l:'GAP Growth',isGap:true},{k:'achCA',l:'Achievement',isPct:true}]},
      {id:'sa',name:'💰 Saving Account',unit:'M',color:'sa',metrics:[{k:'sa_mtd',l:'Growth MTD'},{k:'sa_tgt',l:'Target MTD'},{k:'gapSA',l:'GAP Growth',isGap:true},{k:'achSA',l:'Achievement',isPct:true}]},
      {id:'fu',name:'📈 Funding',unit:'M',color:'fu',metrics:[{k:'fu_mtd',l:'Growth MTD'},{k:'fu_tgt',l:'Target MTD'},{k:'gapFU',l:'GAP Growth',isGap:true},{k:'achFU',l:'Achievement',isPct:true}]},
      {id:'con',name:'🛒 Booking Consumer',unit:'M',color:'con',metrics:[{k:'con_mtd',l:'Booking MTD'},{k:'con_tgt',l:'Target MTD'},{k:'gapCon',l:'GAP Booking',isGap:true},{k:'achCon',l:'Achievement',isPct:true}]},
      {id:'sme',name:'🏢 SME - Region',unit:'M',color:'sme',metrics:[{k:'sme_mtd',l:'Booking MTD'},{k:'sme_tgt',l:'Target MTD'},{k:'gapSME',l:'GAP Booking',isGap:true},{k:'achSME',l:'Achievement',isPct:true}]},
      {id:'ph',name:'🕋 Porsi Haji',unit:'',color:'ph',metrics:[{k:'ph_mtd',l:'Booking MTD'},{k:'ph_tgt',l:'Target MTD'},{k:'gapPH',l:'GAP Booking',isGap:true},{k:'achPH',l:'Achievement',isPct:true}]},
      {id:'mdin',name:'📱 MDIN',unit:'',color:'mdin',metrics:[{k:'mdin_mtd',l:'Akuisisi MTD'},{k:'mdin_tgt',l:'Target MTD'},{k:'gapMDIN',l:'GAP Akuisisi',isGap:true},{k:'achMDIN',l:'Achievement',isPct:true}]},
      {id:'qris',name:'💳 QRIS',unit:'',color:'qris',metrics:[{k:'qris_mtd',l:'Akuisisi MTD'},{k:'qris_tgt',l:'Target MTD'},{k:'gapQRIS',l:'GAP Akuisisi',isGap:true},{k:'achQRIS',l:'Achievement',isPct:true}]},
      {id:'sli',name:'☂️ Sunlife (SLI)',unit:'',color:'sli',metrics:[{k:'sli_mtd',l:'Booking MTD'},{k:'sli_tgt',l:'Target MTD'},{k:'gapSLI',l:'GAP Booking',isGap:true},{k:'achSLI',l:'Achievement',isPct:true}]},
      {id:'cif',name:'👥 New CIF',unit:'',color:'cif',metrics:[{k:'cif_mtd',l:'Akuisisi MTD'},{k:'cif_tgt',l:'Target MTD'},{k:'gapCIF',l:'GAP Akuisisi',isGap:true},{k:'achCIF',l:'Achievement',isPct:true}]}
    ];
    
    params.forEach(p => {
      const m0 = total[p.metrics[0].k], m1 = total[p.metrics[1].k], gap = total[p.metrics[2].k], ach = total[p.metrics[3].k];
      const gapClass = gap >= 0 ? 'pos' : 'neg';
      const achClass = getAchieveClass(ach);
      const card = document.createElement('div');
      card.className = `param-card ${p.color}`;
      card.innerHTML = `
        <div class="title">${p.name} <span class="tag mtd">MTD</span></div>
        <div class="metric-row"><span class="label">${p.metrics[0].l}</span><span class="value">${formatNum(m0,p.unit)}</span></div>
        <div class="metric-row"><span class="label">${p.metrics[1].l}</span><span class="value">${formatNum(m1,p.unit)}</span></div>
        <div class="metric-row gap"><span class="label">${p.metrics[2].l}</span><span class="value ${gapClass}">${formatNum(gap,p.unit)}</span></div>
        <div class="achievement"><span class="label">${p.metrics[3].l}</span><div class="value ${achClass}">${ach.toFixed(1)}%</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,ach)}%; background:${ach>=100?'var(--success)':ach>=50?'var(--warning)':'var(--danger)'}"></div></div></div>`;
      container.appendChild(card);
    });
    
    ['CA','SA','FU'].forEach(k => {
      document.getElementById('sumGap'+k).textContent = formatNum(total['gap'+k],'M');
      document.getElementById('sumGap'+k).className = `summary-item value ${total['gap'+k] >= 0 ? 'pos' : 'neg'}`;
    });
    document.getElementById('avgAchieve').textContent = ([total.achCA,total.achSA,total.achFU,total.achCon,total.achSME,total.achPH,total.achMDIN,total.achQRIS,total.achSLI,total.achCIF].reduce((a,b)=>a+b,0)/10).toFixed(1) + '%';
  }

  // 🚀 INIT
  document.addEventListener('DOMContentLoaded', () => {
    setTheme(localStorage.getItem('theme') || 'light');
    themeToggle.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
    loadExternalData();
  });
</script>
</body>
</html>
