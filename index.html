<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Booking Performance Region Sumatera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 10px; margin: 0; font-size: 13px; }
        .container { width: 100%; max-width: 1300px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); box-sizing: border-box; }
        
        .header-title { 
            color: white; 
            background: linear-gradient(90deg, #6a1b9a, #8e24aa); 
            padding: 10px; border-radius: 8px; margin-bottom: 15px;
        }
        .header-title h2 { margin: 0; font-size: 16px; font-weight: bold; }
        .as-of-date { font-size: 13px; opacity: 0.9; display: block; margin-top: 3px; }
        
        /* Filter Container PC (Satu Baris Lurus) */
        .filter-container { 
            display: flex; flex-direction: row; align-items: center; gap: 8px; padding: 12px; 
            background: #f8f9fa; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e9ecef; 
        }

        .filter-group { display: flex; flex-direction: row; gap: 8px; flex: 3; align-items: center; }
        .mobile-row { display: flex; flex-direction: row; gap: 8px; flex: 2; }
        .button-group { display: flex; gap: 8px; flex: 1; align-items: center; }

        select, .btn { 
            height: 40px; box-sizing: border-box; border-radius: 6px; font-size: 13px; 
            margin: 0; display: flex; align-items: center; justify-content: center;
        }

        select { padding: 0 8px; border: 1px solid #ddd; outline: none; flex: 1; min-width: 0; background-color: white; }
        .btn { padding: 0 12px; border: none; cursor: pointer; font-weight: bold; color: white; flex: 1; white-space: nowrap; }
        .reset-btn { background: #28a745; }
        .back-btn { background: #dc3545; }

        #chart-container { position: relative; width: 100%; margin: 10px auto; min-height: 250px; }

        /* Table Desktop */
        .table-container { margin-top: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: #6a1b9a; color: white; padding: 10px 5px; border: 1px solid #5e1689; }
        td { padding: 8px; border: 1px solid #eee; text-align: left; }
        td.clickable { color: #6a1b9a; cursor: pointer; text-decoration: underline; font-weight: 600; }
        .text-right { text-align: right; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* --- RESPONSIVE HP (Mode Card) --- */
        @media screen and (max-width: 768px) {
            .filter-container { flex-direction: column; align-items: stretch; gap: 10px; }
            .filter-group { flex-direction: column; width: 100%; gap: 8px; }
            .mobile-row { width: 100%; gap: 8px; }
            #RankFilter { width: 100% !important; }
            .button-group { width: 100%; }

            /* Tabel Jadi Card agar Detail Data Muncul */
            table, thead, tbody, th, td, tr { display: block !important; width: 100% !important; }
            thead { display: none !important; }
            tr { border: 1px solid #ddd; margin-bottom: 12px; border-radius: 8px; background: #fff; padding: 5px; }
            td { 
                border: none !important; border-bottom: 1px solid #f0f0f0 !important; 
                position: relative; padding: 12px 10px 12px 45% !important; 
                text-align: right !important; min-height: 45px; display: flex !important;
                align-items: center; justify-content: flex-end;
            }
            td:before { 
                content: attr(data-label); 
                position: absolute; left: 10px; width: 40%; 
                font-weight: bold; color: #6a1b9a; text-align: left;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h2 id="mainHeader">Booking Performance</h2>
        <span id="dateDisplay" class="as-of-date"></span>
    </div>
    
    <div class="filter-container">
        <div class="filter-group">
            <div class="mobile-row">
                <select id="BranchFilter"><option value="">Semua MB</option></select>
                <select id="OfficeFilter"><option value="">Semua Office</option></select>
            </div>
            <select id="RankFilter">
                <option value="top10" selected>Top 10 Booking</option>
                <option value="bottom10">Bottom 10 Booking</option>
                <option value="all">Semua Data</option>
            </select>
        </div>
        <div class="button-group">
            <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
            <button class="btn back-btn" onclick="openPage()">M-Direct</button>
        </div>
    </div>

    <div id="chart-container"><canvas id="myBarChart"></canvas></div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let myChart = null;
let tableData = [];

function getVal(row, keyName) {
    const foundKey = Object.keys(row).find(k => k.trim().toLowerCase() === keyName.trim().toLowerCase());
    return foundKey ? row[foundKey] : "";
}

function cleanNum(val) {
    if (!val) return 0;
    let s = val.toString().replace(/,/g, '').trim();
    return (s === "-" || s === "") ? 0 : parseFloat(s);
}

function formatJt(val) {
    const n = cleanNum(val);
    return n === 0 ? "-" : Math.round(n / 1000000).toLocaleString('id-ID');
}

function clickToFilter(id, val) {
    const el = document.getElementById(id);
    if(el) { el.value = val; el.dispatchEvent(new Event('change')); }
}

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const diff = (today.getDay() === 1) ? 3 : 1;
    today.setDate(today.getDate() - diff);
    document.getElementById('dateDisplay').innerText = "as of " + today.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
    
    fetch('Dataset.json').then(r => r.json()).then(data => {
        tableData = data;
        init();
    }).catch(err => console.error("Gagal memuat data:", err));
});

function init() {
    if (tableData.length === 0) return;
    const cols = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = cols.map(c => `<th>${c.trim()}</th>`).join('');
    
    const branches = [...new Set(tableData.map(d => getVal(d, 'Main Branch').trim()))].filter(v => v).sort();
    document.getElementById('BranchFilter').innerHTML = '<option value="">Semua MB</option>' + 
        branches.map(v => `<option value="${v}">${v}</option>`).join('');
    
    document.getElementById('BranchFilter').addEventListener('change', updateOfficeDropdown);
    document.getElementById('OfficeFilter').addEventListener('change', render);
    document.getElementById('RankFilter').addEventListener('change', render);
    
    updateOfficeDropdown(); 
}

function updateOfficeDropdown() {
    const bVal = document.getElementById('BranchFilter').value;
    const offices = [...new Set(tableData
        .filter(d => !bVal || getVal(d, 'Main Branch').trim() === bVal)
        .map(d => getVal(d, 'Office').trim())
    )].filter(v => v).sort();
    document.getElementById('OfficeFilter').innerHTML = '<option value="">Semua Office</option>' + 
        offices.map(v => `<option value="${v}">${v}</option>`).join('');
    render();
}

function render() {
    const bVal = document.getElementById('BranchFilter').value;
    const oVal = document.getElementById('OfficeFilter').value;
    const rVal = document.getElementById('RankFilter').value;
    
    let baseFiltered = tableData.filter(d => {
        return (!bVal || getVal(d, 'Main Branch').trim() === bVal) && 
               (!oVal || getVal(d, 'Office').trim() === oVal);
    });

    let sortedData = [...baseFiltered].sort((a, b) => cleanNum(getVal(b, 'Total')) - cleanNum(getVal(a, 'Total')));
    
    let finalTableData = sortedData;
    if (rVal === 'top10') finalTableData = sortedData.slice(0, 10);
    else if (rVal === 'bottom10') finalTableData = sortedData.slice(-10).reverse();

    // Mapping Data untuk Chart
    let chartLabels = finalTableData.map(d => getVal(d, 'Office').trim());
    let chartValues = finalTableData.map(d => Math.round(cleanNum(getVal(d, 'Total')) / 1000000));
    let chartDets = finalTableData.map(d => ({
        emas: cleanNum(getVal(d, 'Emas')),
        multi: cleanNum(getVal(d, 'MultiGuna')),
        hajj: cleanNum(getVal(d, 'Prohajj')),
        kpr: cleanNum(getVal(d, 'KPR')),
        non: cleanNum(getVal(d, 'Non Consumer'))
    }));

    draw(chartLabels, chartValues, chartDets);

    // Render Tabel dengan ATRIBUT DATA-LABEL (PENTING UNTUK HP)
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableBody').innerHTML = finalTableData.map(row => {
        return `<tr>${columns.map(col => {
            const val = row[col];
            const kc = col.trim().toUpperCase();
            const isProd = ["EMAS", "MULTIGUNA", "PROHAJJ", "KPR", "NON CONSUMER"].includes(kc);
            const isNum = isProd || kc === "TOTAL";
            let cls = isNum ? 'text-right' : '';
            let attr = `data-label="${col.trim()}"`; // Memberi label untuk tampilan HP
            
            if(kc === "MAIN BRANCH") { cls+=' clickable'; attr+=` onclick="clickToFilter('BranchFilter','${val.trim()}')"`; }
            if(kc === "OFFICE") { cls+=' clickable'; attr+=` onclick="clickToFilter('OfficeFilter','${val.trim()}')"`; }
            
            return `<td class="${cls}" ${attr}>${isNum ? formatJt(val) : val}</td>`;
        }).join('')}</tr>`;
    }).join('');
}

function draw(labels, data, dets) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if(myChart) myChart.destroy();
    document.getElementById('chart-container').style.height = (labels.length * 45 + 70) + "px";
    
    myChart = new Chart(ctx, {
        type: 'bar', 
        plugins: [ChartDataLabels],
        data: { 
            labels, 
            datasets: [{ 
                data, 
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#2E1A47' : '#36A2EB'), 
                details: dets 
            }] 
        },
        options: {
            indexAxis: 'y', 
            responsive: true, 
            maintainAspectRatio: false,
            layout: { padding: { right: 80, left: 0 } },
            scales: { 
                x: { display: false }, 
                y: { grid: { display: false }, ticks: { font: { size: 13 }, autoSkip: false } } 
            },
            plugins: {
                legend: { display: false },
                datalabels: { 
                    anchor: 'end', align: 'right', offset: 4,
                    formatter: v => v.toLocaleString('id-ID') + " Jt", 
                    font: { weight: 'bold', size: 13 }
                },
                tooltip: {
                    enabled: true,
                    triggerOn: 'click',
                    callbacks: {
                        label: function(context) {
                            const d = context.dataset.details[context.dataIndex];
                            const f = (n) => Math.round(n/1000000).toLocaleString('id-ID') + " Jt";
                            return [
                                `Total: ${context.raw.toLocaleString('id-ID')} Jt`,
                                `Emas: ${f(d.emas)}`, `Multiguna: ${f(d.multi)}`,
                                `Prohajj: ${f(d.hajj)}`, `KPR: ${f(d.kpr)}`,
                                `Non Consumer: ${f(d.non)}`
                            ];
                        }
                    }
                }
            }
        }
    });
}

function resetFilter() { location.reload(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
