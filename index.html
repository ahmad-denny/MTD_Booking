<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Performance Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: auto; }
        #chart-container { position: relative; width: 100%; margin-top: 20px; }
        .filter-container { display: flex; gap: 10px; margin-bottom: 20px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex: 1; }
        .table-container { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #6a1b9a; color: white; padding: 10px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="filter-container">
        <select id="BranchFilter"><option value="">Semua Branch</option></select>
        <select id="OfficeFilter"><option value="">Semua Office</option></select>
        <button onclick="resetFilter()" style="padding:10px 20px; cursor:pointer;">Reset</button>
    </div>

    <div id="chart-container">
        <canvas id="myBarChart"></canvas>
    </div>

    <div class="table-container">
        <table>
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let tableData = [];
let myChart = null;

// --- SOLUSI UTAMA: Fungsi Pembersih Angka (Menghapus Koma Ribuan) ---
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val || val === "-") return 0;
    
    // Hapus tanda koma (,) karena di data Anda koma adalah pemisah ribuan
    // Contoh: "1,038,390,113" menjadi "1038390113"
    let cleaned = val.toString().replace(/,/g, '');
    return parseFloat(cleaned) || 0;
}

document.addEventListener('DOMContentLoaded', () => {
    // Simulasi data sesuai gambar Anda
    tableData = [
        {"Main Branch": "BENGKULU", "Office": "BENGKULU", "Total": "1,038,390,113"},
        {"Main Branch": "BENGKULU", "Office": "KCP CURUP", "Total": "340,565,765"},
        {"Main Branch": "BENGKULU", "Office": "KCP ARGA MAKMUR", "Total": "-"},
        {"Main Branch": "BENGKULU", "Office": "KCP MANNA BENGKULU", "Total": "42,380,689"},
        {"Main Branch": "BENGKULU", "Office": "JAMBI", "Total": "453,548,464"},
        {"Main Branch": "BENGKULU", "Office": "KCP MUARA BUNGO", "Total": "328,064,988"}
    ];
    init();
});

function init() {
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = columns.map(c => `<th>${c}</th>`).join('');
    
    const branches = [...new Set(tableData.map(d => d['Main Branch']))];
    document.getElementById('BranchFilter').innerHTML += branches.map(b => `<option value="${b}">${b}</option>`).join('');
    
    document.getElementById('BranchFilter').addEventListener('change', update);
    document.getElementById('OfficeFilter').addEventListener('change', update);
    update();
}

function update() {
    const bVal = document.getElementById('BranchFilter').value;
    const oVal = document.getElementById('OfficeFilter').value;

    const filtered = tableData.filter(d => (!bVal || d['Main Branch'] === bVal) && (!oVal || d['Office'] === oVal));
    
    // Hitung Map untuk Chart
    const map = {};
    filtered.forEach(d => {
        const val = cleanNumber(d['Total']);
        map[d['Office']] = (map[d['Office']] || 0) + val;
    });

    let entries = Object.entries(map).sort((a, b) => b[1] - a[1]);
    let labels = entries.map(e => e[0]);
    let values = entries.map(e => e[1]);

    if (bVal) {
        labels.unshift("TOTAL " + bVal);
        values.unshift(values.reduce((a, b) => a + b, 0));
    }

    renderChart(labels, values);
    renderTable(filtered);
}

function renderChart(labels, values) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();

    document.getElementById('chart-container').style.height = (labels.length * 45 + 100) + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#4E337E' : '#36A2EB'),
                barPercentage: 0.8
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { 
                padding: { right: 150 } // Ruang ekstra agar angka Miliar tidak terpotong
            },
            scales: { 
                x: { display: false }, 
                y: { grid: { display: false }, ticks: { font: { size: 10 } } } 
            },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'right',
                    offset: 10,
                    color: '#000',
                    font: { weight: 'bold', size: 11 },
                    // Format tampilan angka dengan titik pemisah ribuan di Chart
                    formatter: (v) => v.toLocaleString('id-ID')
                }
            }
        }
    });
}

function renderTable(data) {
    document.getElementById('tableBody').innerHTML = data.map(row => 
        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
    ).join('');
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    document.getElementById('OfficeFilter').value = "";
    update();
}
</script>
</body>
</html>
